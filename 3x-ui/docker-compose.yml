---
x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: 50m
      max-file: 4
      compress: "true"
      mode: non-blocking
      max-buffer-size: 4m

services:
  3x-ui:
    <<: *common
    image: ghcr.io/mhsanaei/3x-ui
    volumes:
      - 3x_ui_db:/etc/x-ui
      - 3x_ui_cert:/root/cert
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
    ports:
      # Publish any other required inbound ports here, or switch to network_mode: host.
      - "443:443" # VPN traffic

  caddy:
    <<: *common
    image: caddy
    ports:
      - "80:80"
      - "8443:443" # Panel UI, exposed as https://x.example.com:8443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - 3x-ui

volumes:
  3x_ui_db:
  3x_ui_cert:
  caddy_data:
  caddy_config:
